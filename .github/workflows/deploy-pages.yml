name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npx ng build --configuration production --base-href "/deltecnologia-frontend/"

      - name: Adjust base href for GitHub Pages
        run: |
          sed -i 's#<base href="/">#<base href="/deltecnologia-frontend/">#' dist/deltecnologia/browser/index.html

      - name: Prepare SPA fallback
        run: |
          cp dist/deltecnologia/browser/index.html dist/deltecnologia/browser/404.html
          touch dist/deltecnologia/browser/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/deltecnologia/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
